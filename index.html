<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algo Beta Program</title>
  <style>
    :root {
      --navy: #152e53;
      --blue: #0070c1;
      --deep-blue: #00528b;
      --sky: #44ade2;
      --green: #a6ce39;
      --gray-900: #1f2937;
      --gray-700: #4b5563;
      --gray-500: #6b7280;
      --gray-300: #d1d5db;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(21, 46, 83, 0.12);
      --radius-xl: 28px;
      --radius-2xl: 32px;
      --max-width: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--gray-900);
      background: var(--white);
      line-height: 1.5;
    }

    a { text-decoration: none; }
    .container {
      width: min(var(--max-width), calc(100% - 48px));
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: var(--white);
      padding: 72px 0 64px;
    }
    .hero-shape-top {
      position: absolute;
      top: -110px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: var(--sky);
      opacity: 0.9;
    }
    .hero-shape-right {
      position: absolute;
      top: 24px;
      right: -120px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.9;
    }
    .hero-shape-left {
      position: absolute;
      bottom: 0;
      left: -120px;
      width: 48%;
      height: 300px;
      border-top-right-radius: 220px;
      background: var(--deep-blue);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--blue);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
    }
    .brand-name {
      font-size: 34px;
      letter-spacing: -0.02em;
      color: var(--gray-700);
    }
    .brand-name .sec { color: var(--blue); }

    .pill {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid #cfe8f7;
      background: #eef8fe;
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 72px;
      line-height: 0.98;
      color: var(--navy);
      letter-spacing: -0.04em;
    }
    h1 .highlight { color: var(--blue); }

    .subhero {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-top: 24px;
    }
    .subhero-line {
      width: 2px;
      height: 58px;
      background: var(--green);
      margin-top: 4px;
      flex: 0 0 auto;
    }
    .subhero p {
      margin: 0;
      font-size: 34px;
      line-height: 1.12;
      color: var(--navy);
      max-width: 560px;
    }

    .hero-copy {
      margin-top: 28px;
      max-width: 580px;
      font-size: 20px;
      line-height: 1.7;
      color: var(--gray-700);
    }
    .tagline {
      margin-top: 24px;
      font-size: 30px;
      font-weight: 700;
      color: var(--blue);
    }
    .tagline span { color: var(--green); }

    .cta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 34px;
    }
    .btn {
      display: inline-block;
      padding: 16px 28px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--blue);
      color: var(--white);
      box-shadow: 0 16px 30px rgba(0, 112, 193, 0.18);
    }
    .btn-secondary {
      border: 1px solid var(--gray-300);
      color: var(--navy);
      background: var(--white);
    }

    .chat-card-wrap { position: relative; }
    .chat-dot {
      position: absolute;
      top: -26px;
      right: 52px;
      width: 96px;
      height: 96px;
      background: #e8f6fd;
      border-radius: 50%;
    }
    .chat-card {
      position: relative;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-2xl);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .chat-inner {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-xl);
      background: #f8fafc;
      padding: 18px;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--gray-200);
    }
    .chat-status {
      color: var(--gray-500);
      font-size: 14px;
    }
    .bubble-row { margin-bottom: 14px; }
    .bubble {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
    }
    .bubble.user {
      background: #dff2fd;
      color: var(--navy);
      margin-left: auto;
